<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1400px;
    height: 1400px;
    background: #0A0A0F;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', monospace;
    position: relative;
    overflow: hidden;
  }
  /* Grid lines background */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
  }
  /* Glow circle */
  .glow {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,255,136,0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
  }
  .logo {
    font-size: 120px;
    font-weight: bold;
    color: #00FF88;
    letter-spacing: 8px;
    text-shadow: 0 0 40px rgba(0,255,136,0.5), 0 0 80px rgba(0,255,136,0.2);
    margin-bottom: 10px;
  }
  .daily {
    font-size: 72px;
    font-weight: bold;
    color: #FFFFFF;
    letter-spacing: 20px;
    margin-bottom: 40px;
  }
  .tagline {
    font-size: 32px;
    color: rgba(0,255,136,0.6);
    letter-spacing: 6px;
    text-transform: uppercase;
  }
  .prompt {
    position: absolute;
    bottom: 60px;
    left: 60px;
    font-size: 24px;
    color: rgba(0,255,136,0.3);
  }
  .cursor {
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  /* Scan lines */
  .scanlines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.1) 2px,
      rgba(0,0,0,0.1) 4px
    );
    z-index: 3;
    pointer-events: none;
  }
  /* Border */
  .border {
    position: absolute;
    top: 20px; left: 20px; right: 20px; bottom: 20px;
    border: 2px solid rgba(0,255,136,0.2);
    z-index: 2;
  }
  /* Corner accents */
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    z-index: 4;
  }
  .corner-tl { top: 15px; left: 15px; border-top: 3px solid #00FF88; border-left: 3px solid #00FF88; }
  .corner-tr { top: 15px; right: 15px; border-top: 3px solid #00FF88; border-right: 3px solid #00FF88; }
  .corner-bl { bottom: 15px; left: 15px; border-bottom: 3px solid #00FF88; border-left: 3px solid #00FF88; }
  .corner-br { bottom: 15px; right: 15px; border-bottom: 3px solid #00FF88; border-right: 3px solid #00FF88; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="border"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="content">
    <div class="logo">HACKWIRE</div>
    <div class="daily">DAILY</div>
    <div class="tagline">CYBERSECURITY · THREAT · BRIEFING</div>
  </div>
  <div class="prompt">root@hackwire:~$ <span class="cursor">█</span></div>
  <div class="scanlines"></div>
</body>
</html>
